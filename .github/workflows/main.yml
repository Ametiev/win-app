name: Build Proton VPN

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive # Автоматически скачает встроенные зависимости (Go/Rust компоненты)

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.x' # Proton VPN работает на .NET 6

    - name: Restore Dependencies
      run: dotnet restore src/ProtonVPN.sln

    - name: Publish Client Executable
      run: dotnet publish src/Client/ProtonVPN.Client/ProtonVPN.Client.csproj -c Release -r win-x64 --self-contained -o build_output

    - name: Upload Finished Exe
      uses: actions/upload-artifact@v4
      with:
        name: ProtonVPN-Windows-64bit
        path: build_output/
